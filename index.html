<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Monopoly Pay</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">

        <header class="app-header d-flex justify-content-between align-items-center px-3 py-2">
            <div>
                <h2 class="mb-0">
                    <i class="bi bi-bank2"></i>
                    Monopoly Pay
                </h2>
                <small>Digital Monopoly Wallet</small>
            </div>

            <button class="btn btn-light btn-sm rounded-circle text-success" onclick="window.location.reload();" title="Refresh Data">
                <i class="bi bi-arrow-clockwise fs-5"></i>
            </button>
        </header>

        <main id="pageContent">
            </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="showPage('dashboard')">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </button>

            <button class="nav-btn" onclick="showPage('transfer')">
                <i class="bi bi-cash-stack"></i>
                <span>Transfer</span>
            </button>

            <button class="nav-btn" onclick="showPage('bank')">
                <i class="bi bi-bank"></i>
                <span>Bank</span>
            </button>

            <button class="nav-btn" onclick="showPage('history')">
                <i class="bi bi-clock-history"></i>
                <span>History</span>
            </button>

            <button class="nav-btn" onclick="showPage('setting')">
                <i class="bi bi-gear-fill"></i>
                <span>Setting</span>
            </button>
        </nav>

    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/dashboard.js"></script>
    <script src="js/money.js"></script>
    <script src="js/historyService.js"></script>
    <script src="js/refresh.js"></script>

    <script src="js/transfer.js"></script>
    <script src="js/bank.js"></script>
    <script src="js/history.js"></script>

    <script src="js/router.js"></script>
    <script src="js/app.js"></script>

    <!-- POP-UP MODAL SETUP AWAL GAME -->
    <div class="modal fade" id="setupGameModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="setupGameModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered text-dark">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold" id="setupGameModalLabel">
                        <i class="bi bi-sliders"></i> Setup Sesi Game Baru
                    </h5>
                </div>
                <div class="modal-body">
                    <!-- 1. Pengaturan Mata Uang -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Pilih Mata Uang Permainan</label>
                        <select id="popCurrency" class="form-select">
                            <option value="Rp" selected>Rupiah (Rp)</option>
                            <option value="$">Dollar ($)</option>
                            <option value="€">Euro (€)</option>
                            <option value="£">Poundsterling (£)</option>
                            <option value="¥">Yen / Yuan (¥)</option>
                        </select>
                    </div>

                    <!-- 2. Pengaturan Modal Awal -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nominal Modal Awal Player</label>
                        <input type="number" id="popStartingMoney" class="form-control" value="1500000" placeholder="Contoh: 1500000">
                    </div>

                    <!-- 3. Pengaturan Bonus GO Dinamis -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nominal Gaji / Bonus 🟢 GO</label>
                        <input type="number" id="popGoBonus" class="form-control" value="200000" placeholder="Contoh: 200000">
                    </div>

                    <hr>

                    <!-- 4. Pendaftaran Nama-Nama Player -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Daftarkan Nama Player</label>
                        <div class="input-group mb-2">
                            <input type="text" id="popPlayerName" class="form-control" placeholder="Ketik nama player...">
                            <button class="btn btn-outline-success" type="button" onclick="addPlayerFromPopup()">
                                <i class="bi bi-person-plus-fill"></i> Tambah
                            </button>
                        </div>
                        <div id="popPlayerList" class="list-group max-height-list" style="max-height: 150px; overflow-y: auto;">
                            <!-- List pendaftar sementara -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-success w-100 fw-bold py-2" onclick="saveAndStartGame()">
                        <i class="bi bi-play-fill"></i> Mulai Permainan Baru!
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
